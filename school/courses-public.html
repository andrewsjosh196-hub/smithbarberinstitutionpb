<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Courses — SBI School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#6b21a8;--purple-mid:#7c3aed;--purple-light:#a855f7;
  --gold:#c9a84c;--gold-light:#e5c97a;--gold-dark:#a07c28;
  --black:#0a0806;--card:#110f0c;
  --border:rgba(201,168,76,0.2);--border-sub:#1c1a16;
  --white:#faf8f5;--muted:#9a8f7e;
  --green:#6fcf97;--red:#e87b7b;
}
body{font-family:'Raleway',sans-serif;background:var(--black);color:var(--white);min-height:100vh;}

header{background:var(--card);border-bottom:1px solid var(--border);padding:20px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:16px;}
.header-logo{height:40px;width:40px;object-fit:contain;}
.header-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-link{color:var(--gold);text-decoration:none;cursor:pointer;font-size:0.8rem;transition:all 0.2s;padding:8px 12px;border:1px solid transparent;}
.header-link:hover{color:var(--gold-light);}
.user-info{font-size:0.75rem;color:var(--muted);}

.main{max-width:1200px;margin:0 auto;padding:32px 20px;}
.page-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:8px;}
.page-subtitle{color:var(--muted);margin-bottom:32px;}

.user-section{background:linear-gradient(135deg,rgba(107,33,168,0.2),rgba(201,168,76,0.1));border:1px solid var(--border);padding:20px;margin-bottom:32px;border-radius:4px;}
.user-email-display{font-size:0.85rem;margin-bottom:8px;color:var(--muted);}
.user-email-display strong{color:var(--gold);}
.logout-small{background:transparent;border:1px solid var(--border-sub);color:#555;padding:6px 12px;cursor:pointer;font-family:'Raleway',sans-serif;font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;}
.logout-small:hover{border-color:var(--gold);color:var(--gold);}

.course-tier{margin-bottom:48px;}
.tier-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--border);}
.tier-icon{font-size:1.5rem;}
.tier-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;}
.tier-price{color:var(--gold);font-weight:700;margin-left:auto;}
.tier-status{font-size:0.7rem;color:var(--green);margin-left:12px;}

.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.module-card{background:linear-gradient(135deg,rgba(107,33,168,0.15),rgba(201,168,76,0.08));border:1px solid var(--border);padding:20px;position:relative;overflow:hidden;transition:all 0.3s;}
.module-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
.module-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.module-card.locked{opacity:0.6;}

.module-image{width:100%;height:180px;object-fit:cover;margin-bottom:12px;border-radius:2px;background:var(--border-sub);}
.module-title{font-weight:700;font-size:1rem;margin-bottom:8px;}
.module-desc{font-size:0.85rem;color:var(--muted);margin-bottom:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.module-badge{display:inline-block;background:var(--purple);color:var(--white);padding:3px 8px;font-size:0.65rem;border-radius:2px;}

.video-container{position:relative;width:100%;padding-bottom:56.25%;margin-bottom:12px;border-radius:2px;overflow:hidden;}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

.locked-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;border-radius:2px;}
.locked-text{text-align:center;color:var(--white);}
.locked-icon{font-size:2rem;margin-bottom:8px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:12px;}

.purchase-btn{background:var(--gold);color:#000;border:none;padding:10px 16px;font-weight:700;cursor:pointer;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;border-radius:2px;transition:all 0.2s;}
.purchase-btn:hover{background:var(--gold-light);}

.login-prompt{background:linear-gradient(135deg,rgba(201,168,76,0.2),rgba(107,33,168,0.1));border:1px solid var(--gold);padding:20px;margin-bottom:32px;text-align:center;border-radius:4px;}
.login-prompt p{margin-bottom:12px;font-size:0.9rem;}
.login-prompt-btn{background:var(--gold);color:#000;border:none;padding:10px 20px;font-weight:700;cursor:pointer;font-size:0.8rem;border-radius:2px;transition:all 0.2s;}
.login-prompt-btn:hover{background:var(--gold-light);}

@media(max-width:800px){
  .modules-grid{grid-template-columns:1fr;}
  header{flex-direction:column;gap:16px;text-align:center;}
  .header-left{justify-content:center;}
  .header-right{justify-content:center;}
  .tier-header{flex-wrap:wrap;}
  .tier-price{margin-left:auto;margin-right:0;}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="school_logo.png" alt="SBI" class="header-logo" onerror="this.style.display='none'">
    <div class="header-title">Online Courses</div>
  </div>
  <div class="header-right">
    <div class="user-info">
      <div id="userDisplay"></div>
    </div>
    <button class="header-link" onclick="changeUser()" id="changeUserBtn">Change User</button>
    <a class="header-link" href="index.html">← Home</a>
  </div>
</header>

<div class="main">
  <h1 class="page-title">Online Learning <span style="color:var(--gold);">Modules</span></h1>
  <p class="page-subtitle">Access premium course materials, videos, and resources</p>

  <div id="userSection"></div>

  <div id="loginPrompt" class="login-prompt" style="display:none;">
    <p>Want to access all your courses in one place? Create a student account!</p>
    <a class="login-prompt-btn" href="index.html">Create Account or Login</a>
  </div>

  <div id="coursesContainer"></div>

  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="empty-icon">📚</div>
    <p>No courses available yet.</p>
  </div>
</div>

<script>
var currentEmail = localStorage.getItem('publicUserEmail');
var tierIcons = { tier1: '🥇', tier2: '🏆', tier3: '💼', tier4: '🎓' };

function promptForEmail() {
  var email = prompt('Enter your email to access your purchased courses:');
  if (email && email.trim()) {
    email = email.trim().toLowerCase();
    localStorage.setItem('publicUserEmail', email);
    currentEmail = email;
    renderUserSection();
    renderCourses();
  }
}

function changeUser() {
  localStorage.removeItem('publicUserEmail');
  currentEmail = null;
  promptForEmail();
}

function renderUserSection() {
  var section = document.getElementById('userSection');
  if (!currentEmail) return;
  
  section.innerHTML = '<div class="user-section">' +
    '<div class="user-email-display">Logged in as: <strong>' + currentEmail + '</strong></div>' +
    '<button class="logout-small" onclick="changeUser()">Switch Email</button>' +
  '</div>';
}

function getTierData() {
  return JSON.parse(localStorage.getItem('tierData') || '{}');
}

function getPurchasedCourses() {
  if (!currentEmail) return [];
  var purchases = JSON.parse(localStorage.getItem('publicPurchases') || '{}');
  return purchases[currentEmail] || [];
}

function purchaseTier(tierName) {
  if (!currentEmail) {
    alert('Please enter your email first');
    return;
  }
  
  var purchases = JSON.parse(localStorage.getItem('publicPurchases') || '{}');
  if (!purchases[currentEmail]) purchases[currentEmail] = [];
  
  if (!purchases[currentEmail].includes(tierName)) {
    purchases[currentEmail].push(tierName);
    localStorage.setItem('publicPurchases', JSON.stringify(purchases));
    alert('Course added to your account! Check your email for details.');
    renderCourses();
  }
}

function renderCourses() {
  var tierData = getTierData();
  var purchased = getPurchasedCourses();
  var container = document.getElementById('coursesContainer');
  
  document.getElementById('loginPrompt').style.display = currentEmail ? 'none' : 'block';
  
  if (!tierData || Object.keys(tierData).length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  var html = '';
  ['tier1', 'tier2', 'tier3', 'tier4'].forEach(function(tierName) {
    var tier = tierData[tierName];
    if (!tier || !tier.modules || tier.modules.length === 0) return;

    var icon = tierIcons[tierName] || '📖';
    var isPurchased = purchased.includes(tierName);
    
    html += '<div class="course-tier">' +
      '<div class="tier-header">' +
        '<span class="tier-icon">' + icon + '</span>' +
        '<div class="tier-name">' + (tier.name || tierName) + '</div>' +
        '<div class="tier-price">' + (tier.price || '') + '</div>' +
        (isPurchased ? '<div class="tier-status">✓ Purchased</div>' : '') +
      '</div>' +
      '<div class="modules-grid">';

    tier.modules.forEach(function(mod) {
      var moduleName = mod.name || 'Untitled Module';
      var moduleDesc = mod.description || 'No description available';
      var picUrl = mod.pictureUrl || '';
      var vidUrl = mod.videoUrl || '';

      var cardClass = isPurchased ? 'module-card' : 'module-card locked';
      
      html += '<div class="' + cardClass + '">';
      
      if (picUrl) {
        html += '<img src="' + picUrl + '" alt="' + moduleName + '" class="module-image" onerror="this.style.display=\'none\'">';
      } else if (!isPurchased) {
        html += '<div style="width:100%;height:180px;background:var(--border-sub);display:flex;align-items:center;justify-content:center;margin-bottom:12px;border-radius:2px;"><div style="text-align:center;color:var(--muted);">🔒 Preview</div></div>';
      }

      if (!isPurchased) {
        html += '<div class="locked-overlay" style="margin:-20px -20px 0 -20px;z-index:10;border-radius:0;">' +
          '<div class="locked-text">' +
            '<div class="locked-icon">🔒</div>' +
            '<div style="font-size:0.8rem;margin-bottom:12px;">Purchase to unlock</div>' +
            '<button class="purchase-btn" onclick="purchaseTier(\'' + tierName + '\')">Unlock Course</button>' +
          '</div>' +
        '</div>';
      }
      
      html += '<div class="module-title">' + moduleName + '</div>' +
        '<div class="module-desc">' + moduleDesc + '</div>';

      if (isPurchased) {
        if (vidUrl) {
          var embedUrl = '';
          if (vidUrl.includes('youtube.com') || vidUrl.includes('youtu.be')) {
            var videoId = vidUrl.includes('youtu.be') ? vidUrl.split('/').pop() : vidUrl.split('v=')[1];
            embedUrl = 'https://www.youtube.com/embed/' + videoId;
          } else if (vidUrl.includes('vimeo.com')) {
            var vimeoId = vidUrl.split('/').pop();
            embedUrl = 'https://player.vimeo.com/video/' + vimeoId;
          }
          
          if (embedUrl) {
            html += '<div class="video-container"><iframe src="' + embedUrl + '" allowfullscreen></iframe></div>';
          } else if (vidUrl.match(/\.(mp4|webm|ogg)$/i)) {
            html += '<video width="100%" controls style="margin-bottom:12px;border-radius:2px;"><source src="' + vidUrl + '" type="video/mp4"></video>';
          }
        }
      }

      html += '<div class="module-badge">📚 ' + moduleName + '</div>';
      html += '</div>';
    });

    if (!isPurchased && tier.modules.length > 0) {
      html += '<div style="grid-column:1/-1;text-align:center;padding:20px;background:rgba(201,168,76,0.1);border:1px dashed var(--border);border-radius:2px;">' +
        '<button class="purchase-btn" onclick="purchaseTier(\'' + tierName + '\')">Purchase ' + (tier.name || tierName) + ' - ' + (tier.price || 'Contact for pricing') + '</button>' +
      '</div>';
    }

    html += '</div></div>';
  });

  container.innerHTML = html || '<div class="empty-state"><div class="empty-icon">📚</div><p>No courses available yet.</p></div>';
}

// Initialize
if (!currentEmail) {
  promptForEmail();
} else {
  renderUserSection();
}
window.addEventListener('DOMContentLoaded', function() {
  renderCourses();
});
</script>
</body>
</html>
